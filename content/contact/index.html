type = "page"
draft = false
title = 'Contact Us'
+++
<link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
<p>For manuscript submissions, please use our
    <a href="/submissions" rel="noopener">dedicated submissions page</a>.</p>
<p>For all other enquiries, please use the form below.</p>
<form id="contact-form" class="contact-form" novalidate>
    <p><label for="contact-email">Email</label>
        <input type="email" id="contact-email" name="email" style="width: 100%" required autocomplete="email"></p>
    <p><label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="6" style="width: 100%" required ></textarea></p>
    <p><label for="contact-captcha">How much is <span id="captcha-question"></span>?</label>
        <input type="text" id="contact-captcha" name="captcha_answer" style="width: 100%" required autocomplete="off"></p>
    <input type="hidden" id="captcha-expected" name="captcha_expected">
    <p><label class="checkbox-label">
        <input type="checkbox" name="consent" required>
        I consent to this website collecting my personal data via this form.
    </label></p>
    <p><button type="submit" class="btn btn-primary btn-lg">Send Message</button></p>
</form>
<script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
<script src="/main.js"></script>
