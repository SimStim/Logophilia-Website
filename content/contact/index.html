<div class="container">
    <div class="contact-layout">
        <div class="contact-info">
            <p>For manuscript submissions, please use our dedicated page at
                <a href="https://submissions.logophilia.eu/" target="_blank" rel="noopener">submissions.logophilia.eu</a>.</p>
            <p>For all other enquiries, please use the form below.</p>
        </div>
        <form id="contact-form" class="contact-form" novalidate>
            <div class="form-group">
                <label for="contact-name">Name <span class="required">*</span></label>
                <input type="text" id="contact-name" name="name" required autocomplete="name">
                <div class="field-feedback"></div>
            </div>
            <div class="form-group">
                <label for="contact-email">Email <span class="required">*</span></label>
                <input type="email" id="contact-email" name="email" required autocomplete="email">
                <div class="field-feedback"></div>
            </div>
            <div class="form-group">
                <label for="contact-subject">Subject <span class="required">*</span></label>
                <input type="text" id="contact-subject" name="subject" required>
                <div class="field-feedback"></div>
            </div>
            <div class="form-group">
                <label for="contact-message">Message <span class="required">*</span></label>
                <textarea id="contact-message" name="message" rows="6" required></textarea>
                <div class="field-feedback"></div>
            </div>
            <div class="form-group form-captcha">
                <label for="contact-captcha">What is <span id="captcha-question"></span>? <span class="required">*</span></label>
                <input type="text" id="contact-captcha" name="captcha_answer" required autocomplete="off">
                <input type="hidden" id="captcha-expected" name="captcha_expected">
                <div class="field-feedback"></div>
            </div>
            <div class="form-group honeypot" style="display:none" aria-hidden="true">
                <input type="text" name="website" tabindex="-1" autocomplete="off">
            </div>
            <div class="form-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="consent" required>
                    I consent to having this website collect my personal data via this form.
                </label>
                <div class="field-feedback"></div>
            </div>
            <button type="submit" class="btn btn-primary btn-lg">Send Message</button>
            <div id="contact-feedback" class="form-feedback"></div>
        </form>
    </div>
</div>
<button id="scroll-top" class="scroll-top" aria-label="Scroll to top">
    <svg width="20" height="20" viewBox="0 0 20 20"><path d="M10 4l-7 7h4v5h6v-5h4z" fill="currentColor"/></svg>
</button>
<script src="main.js"></script>
